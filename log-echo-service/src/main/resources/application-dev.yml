# ---------------------------------------------------------------------------
# CORTEX log-echo-service - dev profile (rule A6.1, 15.2).
# Full health detail, debug-level CORTEX logs, faster Eureka registration.
# ---------------------------------------------------------------------------

management:
  endpoint:
    health:
      show-details: always

# Pin the dev-profile Eureka instance advertisement to loopback. The host
# may have multiple NICs (WiFi + corporate VPN tunnel); without this the
# auto-detected non-loopback IP is non-deterministic and the gateway can
# end up calling lb://log-echo-service at an IP it cannot route to.
# Loopback is safe here because every Spring Boot app runs on the same
# developer machine in the dev profile. log-echo-service has no prod
# profile (it is a dev/smoke placeholder service), so this override is
# dev-only by construction.
eureka:
  instance:
    ip-address: 127.0.0.1

logging:
  level:
    io.cortex: DEBUG
    com.netflix.discovery: INFO
