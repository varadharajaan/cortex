# ---------------------------------------------------------------------------
# CORTEX log-echo-service - base profile (rule A6.1, 15.2).
# Throwaway downstream stub (ADR-0016) used for gateway smoke tests.
# Profile-specific overrides live in application-{profile}.yml.
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-echo-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null

server:
  port: 8093
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    root: INFO
    io.cortex: INFO
