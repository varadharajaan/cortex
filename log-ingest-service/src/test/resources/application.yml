# ---------------------------------------------------------------------------
# CORTEX log-ingest-service - test classpath defaults.
#
# Loaded with highest precedence under src/test/resources so
# @SpringBootTest boots without:
#   - a real Eureka registry (eureka.client.enabled=false)
#   - PII keystores or service-JWT issuer (mTLS scaffold stays off)
#
# Datasource is intentionally NOT declared here. Slice tests
# (@WebMvcTest, plain JUnit) do not need a DataSource, and full
# @SpringBootTest classes wire Postgres via Testcontainers +
# @ServiceConnection (P4.1 / RA1 / ADR-0022). Declaring a static
# H2 URL here would override @ServiceConnection's driver-class-name
# and leave Hikari loading the H2 driver against a real Postgres
# socket (LD61).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-ingest-service
  main:
    banner-mode: "off"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 0

# Disable Eureka entirely for unit / context-load tests.
# Smoke tests stand up a real Eureka via the per-phase smoke script.
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

cortex:
  ingest:
    # Hot-path dedupe OFF by default for slice / IT tests so that
    # adding spring-boot-starter-data-redis does not require every IT
    # to spin up a Redis container. The dedicated IdempotencyDedupeIT
    # (later commit in the P4.2 chain) opts back in via
    # @TestPropertySource / @DynamicPropertySource.
    dedupe:
      enabled: false
    # P4.4b / ADR-0026: the SCSt Kafka outbox poller is OFF by
    # default for slice / IT tests so that adding the binder does
    # not require every IT to spin up a Kafka container. The
    # dedicated OutboxPollerKafkaIT opts back in via
    # @DynamicPropertySource and points the binder at a Testcontainers
    # KafkaContainer.
    outbox:
      poller:
        enabled: false
      # cloudevent block must be bound (even when the poller is off)
      # because @ConfigurationProperties records leave the nested
      # CloudEventProps null otherwise, which would NPE the moment
      # OutboxPollerKafkaIT enables the poller via DynamicPropertySource.
      cloudevent:
        source: "/cortex/log-ingest-service"
        type: "io.cortex.logs.event.v1"
  security:
    service-jwt:
      required: false
      expected-issuer: ""
    mtls:
      enabled: false

logging:
  level:
    io.cortex: DEBUG
    com.netflix.discovery: WARN
    org.flywaydb: WARN
