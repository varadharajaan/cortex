# ---------------------------------------------------------------------------
# CORTEX log-ingest-service - base profile (rule A6.1, 15.2).
#
# P4.0 scaffold: actuator + Eureka + Flyway baseline + mTLS-ready
# scaffold (commented SslBundle block). Profile-specific overrides
# live in application-{profile}.yml.
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-ingest-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  # ----- Persistence (D1 / ADR-0022): Spring Data JDBC + Flyway -----------
  # Connection pulled from env vars in every non-dev profile. Local dev
  # falls back to the smoke-compose Postgres on localhost:5432 (see
  # application-dev.yml + infra/local/docker-compose.smoke.yml).
  datasource:
    url: ${CORTEX_INGEST_DB_URL:jdbc:postgresql://localhost:5432/cortex_ingest}
    username: ${CORTEX_INGEST_DB_USERNAME:cortex_ingest}
    password: ${CORTEX_INGEST_DB_PASSWORD:cortex_ingest}
    hikari:
      maximum-pool-size: 10
      pool-name: cortex-ingest-pool
  # ----- Redis (D3 / P4.2 hot-path dedupe). Lettuce is lazy on
  # connection so this block does NOT force a TCP handshake at boot;
  # the first SETNX inside IdempotencyDedupeService opens the
  # connection. Override REDIS_HOST / REDIS_PORT in non-dev profiles.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ----- Kafka producer (P4.4b / ADR-0026 + P4.4c / ADR-0027) -------------
  # OutboxPoller publishes CloudEvent 1.0 structured-mode JSON envelopes
  # to topic `cortex.logs.events.v1` (production) and
  # `cortex.logs.events.v1.dlq` (P4.4c retry-exhausted DLQ) via Spring
  # Kafka's KafkaTemplate behind the `OutboxEventPublisher` seam.
  # Producer details (acks=all, idempotence, retries, zstd) are
  # configured in code (KafkaConfig). The publisher choice is gated by
  # `cortex.outbox.publisher` below (kafka by default; servicebus stub
  # parks publish attempts until the P10 infra phase wires the real
  # connector). SCSt outbound binding was prototyped at P4.4b but
  # silently dropped messages between the bound channel subscriber and
  # the producer network thread (LD79 / ADR-0026 D2). Auto-create
  # handled by the broker in local-dev
  # (KAFKA_AUTO_CREATE_TOPICS_ENABLE=true on the smoke compose stack);
  # explicit topic provisioning + retention tuning is a P10 infra story.
  kafka:
    bootstrap-servers: ${CORTEX_KAFKA_BROKERS:localhost:9092}

server:
  port: 8092
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ----- mTLS-ready scaffold (O8 / LD39 / ADR-0020) -------------------------
# Spring Boot 3.3 auto-configures org.springframework.boot.ssl.SslBundles
# when this block is present. The bundle is intentionally COMMENTED for
# P4.0: it would require a keystore + truststore on disk in every profile.
# Uncomment + populate when P5.x rolls mTLS out cluster-wide.
#
# spring:
#   ssl:
#     bundle:
#       jks:
#         cortex-ingest:
#           key:
#             alias: cortex-ingest
#           keystore:
#             location: file:${CORTEX_KEYSTORE_PATH}
#             password: ${CORTEX_KEYSTORE_PASSWORD}
#             type: PKCS12
#           truststore:
#             location: file:${CORTEX_TRUSTSTORE_PATH}
#             password: ${CORTEX_TRUSTSTORE_PASSWORD}
#             type: PKCS12

cortex:
  ingest:
    # Hot-path dedupe via Redis SETNX on the Idempotency-Key header
    # (D3 / plan.md row P4.2 / spec Sec 5.3). Cold-path
    # UNIQUE (tenant_id, event_id) on raw_logs is always active and
    # acts as the durable backstop when the hot path is disabled or
    # Redis is unreachable (the service fails open).
    dedupe:
      enabled: ${CORTEX_INGEST_DEDUPE_ENABLED:true}
      ttl: ${CORTEX_INGEST_DEDUPE_TTL:PT24H}
    # Server-side enrichment pipeline (P4.3 / plan row 169).
    # GeoIP enricher returns this constant country code for every
    # caller; real MaxMind GeoLite2 lookup is deferred to P5 (the
    # label key set + Postman + smoke wiring stays stable across
    # both implementations).
    enrichment:
      geo:
        fixed-country: ${CORTEX_INGEST_GEO_FIXED_COUNTRY:unknown}
    # Outbox poller (P4.4b / ADR-0026). Drains PENDING rows from
    # `outbox_events` into the Kafka topic `cortex.logs.events.v1` as
    # CloudEvent 1.0 structured-mode JSON envelopes via Spring Kafka's
    # KafkaTemplate directly (see comment above `spring.kafka` for why
    # SCSt outbound was skipped at P4.4b). Poll cadence + batch size
    # are env-overridable so prod can tune without a redeploy. Backoff
    # cap pins the longest stretch a failing row can wait between
    # retry attempts.
    outbox:
      poller:
        enabled: ${CORTEX_INGEST_OUTBOX_POLLER_ENABLED:true}
        fixed-delay-ms: ${CORTEX_INGEST_OUTBOX_POLLER_DELAY_MS:1000}
        batch-size: ${CORTEX_INGEST_OUTBOX_POLLER_BATCH:100}
        backoff-initial-ms: ${CORTEX_INGEST_OUTBOX_POLLER_BACKOFF_INITIAL_MS:1000}
        backoff-max-ms: ${CORTEX_INGEST_OUTBOX_POLLER_BACKOFF_MAX_MS:300000}
      cloudevent:
        source: ${CORTEX_INGEST_OUTBOX_CE_SOURCE:/cortex/log-ingest-service}
        type: ${CORTEX_INGEST_OUTBOX_CE_TYPE:io.cortex.logs.event.v1}
  # ----- Outbox publisher binder gate (P4.4c / ADR-0027 D5) ---------------
  # Selects which `OutboxEventPublisher` bean is wired by the
  # @ConditionalOnProperty gates on `KafkaOutboxPublisher` and
  # `ServiceBusOutboxPublisher`. The Kafka publisher is the default
  # (`matchIfMissing=true`); set to `servicebus` to wire the Azure
  # Service Bus stub (which throws UnsupportedOperationException on
  # every publish until the P10 infra phase lands the real connector).
  # The DLQ topic is fixed at `cortex.logs.events.v1.dlq` per
  # ADR-0027 D1 (separate topic, NOT an in-table dead-letter column).
  outbox:
    publisher: ${CORTEX_OUTBOX_PUBLISHER:kafka}
  security:
    # When true, every request to /api/** MUST carry a valid
    # X-Cortex-Service-JWT header (presence-only in P4.0; full parse +
    # signature validation lands in P5.x). Default false for local dev.
    service-jwt:
      required: false
      expected-issuer: ""
    # Reserved for the future mTLS rollout flag (P5.x). Read by tooling /
    # smoke scripts; no runtime effect in P4.0.
    mtls:
      enabled: false

logging:
  level:
    root: INFO
    io.cortex: INFO
    com.netflix.discovery: WARN
