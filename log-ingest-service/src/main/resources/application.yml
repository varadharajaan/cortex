# ---------------------------------------------------------------------------
# CORTEX log-ingest-service - base profile (rule A6.1, 15.2).
#
# P4.0 scaffold: actuator + Eureka + Flyway baseline + mTLS-ready
# scaffold (commented SslBundle block). Profile-specific overrides
# live in application-{profile}.yml.
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-ingest-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  # ----- Persistence (D1 / ADR-0022): Spring Data JDBC + Flyway -----------
  # Connection pulled from env vars in every non-dev profile. Local dev
  # falls back to the smoke-compose Postgres on localhost:5432 (see
  # application-dev.yml + infra/local/docker-compose.smoke.yml).
  datasource:
    url: ${CORTEX_INGEST_DB_URL:jdbc:postgresql://localhost:5432/cortex_ingest}
    username: ${CORTEX_INGEST_DB_USERNAME:cortex_ingest}
    password: ${CORTEX_INGEST_DB_PASSWORD:cortex_ingest}
    hikari:
      maximum-pool-size: 10
      pool-name: cortex-ingest-pool
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8091
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ----- mTLS-ready scaffold (O8 / LD39 / ADR-0020) -------------------------
# Spring Boot 3.3 auto-configures org.springframework.boot.ssl.SslBundles
# when this block is present. The bundle is intentionally COMMENTED for
# P4.0: it would require a keystore + truststore on disk in every profile.
# Uncomment + populate when P5.x rolls mTLS out cluster-wide.
#
# spring:
#   ssl:
#     bundle:
#       jks:
#         cortex-ingest:
#           key:
#             alias: cortex-ingest
#           keystore:
#             location: file:${CORTEX_KEYSTORE_PATH}
#             password: ${CORTEX_KEYSTORE_PASSWORD}
#             type: PKCS12
#           truststore:
#             location: file:${CORTEX_TRUSTSTORE_PATH}
#             password: ${CORTEX_TRUSTSTORE_PASSWORD}
#             type: PKCS12

cortex:
  security:
    # When true, every request to /api/** MUST carry a valid
    # X-Cortex-Service-JWT header (presence-only in P4.0; full parse +
    # signature validation lands in P5.x). Default false for local dev.
    service-jwt:
      required: false
      expected-issuer: ""
    # Reserved for the future mTLS rollout flag (P5.x). Read by tooling /
    # smoke scripts; no runtime effect in P4.0.
    mtls:
      enabled: false

logging:
  level:
    root: INFO
    io.cortex: INFO
    com.netflix.discovery: WARN
