# ---------------------------------------------------------------------------
# CORTEX log-ingest-service - dev profile (rule A6.1, 15.2).
# Full health detail, debug-level CORTEX logs, faster Eureka registration.
# Uses the smoke-compose Postgres on localhost:5432.
# P4.4b / ADR-0026: Kafka binder points at the smoke-compose Kafka on
# localhost:9092; topics auto-created server-side. Outbox poller fires
# every 250ms in dev for snappier smoke turnaround.
# ---------------------------------------------------------------------------

spring:
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${CORTEX_KAFKA_BROKERS:localhost:9092}

management:
  endpoint:
    health:
      show-details: always

cortex:
  ingest:
    outbox:
      poller:
        fixed-delay-ms: 250

# Pin the dev-profile Eureka instance advertisement to loopback. The host
# may have multiple NICs (WiFi + corporate VPN tunnel); without this the
# auto-detected non-loopback IP is non-deterministic and the gateway can
# end up calling lb://log-ingest-service at an IP it cannot route to.
# Loopback is safe here because every Spring Boot app runs on the same
# developer machine in the dev profile. Staging / prod use K8s Service
# DNS instead of Eureka entirely, so this override is dev-only.
eureka:
  instance:
    ip-address: 127.0.0.1

logging:
  level:
    io.cortex: DEBUG
    com.netflix.discovery: INFO
    org.flywaydb: INFO
    org.springframework.cloud.stream: INFO
    org.apache.kafka: WARN
