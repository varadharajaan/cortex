# ---------------------------------------------------------------------------
# CORTEX - local-dev smoke compose (P3.0b onward, ADR-0016 / LD24).
#
# What this brings up:
#   - redis      : rate-limit + idempotency store (used by P3.2 + P4.2).
#   - wiremock   : Ollama stub used by P3.3 (NL -> LogQL) AND the
#                  Quickwit fake used by scripts/smoke-p5-1.ps1 cold
#                  path before the real Quickwit container landed.
#   - postgres   : ingestion durable system-of-record (used by P4.0+).
#   - kafka      : SCSt CloudEvents broker (P4.4b / ADR-0026).
#   - quickwit   : real Quickwit cluster for the indexer admin +
#                  search closed loop (P7.1a / ADR-0043 cross-phase
#                  closer; scripts/smoke-p7-1a.ps1 boots
#                  log-indexer-service against this service with
#                  cortex.indexer.admin.backend=quickwit AND
#                  cortex.indexer.search.backend=quickwit). The same
#                  service is reused for the P5.3 QuickwitSink writer
#                  closed loop when needed.
#
# What this DELIBERATELY does NOT bring up:
#   - eureka     : booted by the per-phase smoke script via
#                  `mvnw spring-boot:run` against
#                  `infra/eureka/eureka-server` (avoids needing a
#                  Dockerfile + image rebuild on every code change).
#   - log-echo-service : same pattern as eureka. Booted by the smoke
#                  script directly from source. Removed entirely at
#                  P4 once log-ingest-service is mature.
#   - log-gateway : booted by the smoke script directly from source so
#                  changes are picked up without an image rebuild.
#   - log-ingest-service : same pattern -- booted from source by the
#                  P4.0+ smoke scripts so iteration is rebuild-free.
#   - log-indexer-service : same pattern -- booted from source by
#                  scripts/smoke-p7-1a.ps1 against the quickwit
#                  service below (ADR-0043).
#
# Per LD24 this file is a temporary BRIDGE. The full multi-service
# compose stack lands at P10 (`infra/docker/`).
#
# Lifecycle (mirrored by scripts/smoke-p3-*.ps1 / scripts/smoke-p4-*.ps1):
#   docker compose -f infra/local/docker-compose.smoke.yml up -d
#   ... run smoke + Newman ...
#   docker compose -f infra/local/docker-compose.smoke.yml down -v
# ---------------------------------------------------------------------------

name: cortex-smoke

services:

  redis:
    image: redis:7-alpine
    container_name: cortex-smoke-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cortex-smoke-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cortex_ingest
      POSTGRES_PASSWORD: cortex_ingest
      POSTGRES_DB: cortex_ingest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex_ingest -d cortex_ingest"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  wiremock:
    image: wiremock/wiremock:3.10.0
    container_name: cortex-smoke-wiremock
    ports:
      - "8094:8080"
    command:
      - --port=8080
      - --verbose
      - --global-response-templating
    # P3.3 / ADR-0018: mount the Ollama /api/chat stubs (happy +
    # schema-miss + refusal). Read-only so the container cannot mutate
    # the canonical mapping files on the host. New stubs land in the
    # same folder and reload on container restart.
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # P4.4b (ADR-0026): Kafka broker for the SCSt CloudEvents publisher.
  # KRaft mode -- no Zookeeper. Single-broker, single-partition smoke topology.
  # Topic `cortex.logs.events.v1` is auto-created by SCSt on first send.
  # Two listeners so both the host JVM (localhost:9092) and other compose
  # containers (kafka:9093) can reach the broker.
  kafka:
    image: apache/kafka:3.8.0
    container_name: cortex-smoke-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # P7.1a (ADR-0043): real Quickwit cluster for the log-indexer-service
  # cross-phase closer smoke + Postman + Newman gates. Boots with the
  # default single-node config so admin (create / list / drop /
  # delete-tasks) + search (POST /api/v1/<index>/search) work
  # out-of-the-box on :7280. Storage at /quickwit/qwdata (ephemeral
  # to the container -- no volume mount on purpose, smoke is
  # always-clean).
  #
  # The smoke contract (scripts/smoke-p7-1a.ps1) boots
  # log-indexer-service against this container with
  # cortex.indexer.admin.backend=quickwit AND
  # cortex.indexer.search.backend=quickwit so the
  # QuickwitHttpAdmin + QuickwitHttpSearch beans fire and produce
  # real wire traffic against the cluster.
  quickwit:
    image: quickwit/quickwit:0.8.1
    container_name: cortex-smoke-quickwit
    ports:
      - "7280:7280"
    command: ["run"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7280/health/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  # P8.2a (ADR-0047): Prometheus server for the log-monitoring-service
  # cross-phase closer smoke + Postman + Newman gates. Mounts
  # ./prometheus.yml (the scrape config that targets the locally-booted
  # log-monitoring-service on host.docker.internal:8098/actuator/prometheus)
  # AND ./alerts (the SLO multi-window burn-rate rule file from
  # infra/local/alerts/slo-burn-rate.rules.yml, ADR-0046 D6). Read-only
  # mounts so the container cannot mutate the canonical config on the
  # host. Storage at /prometheus is ephemeral to the container -- smoke
  # is always-clean.
  #
  # The smoke contract (scripts/smoke-p8-2a.ps1) boots
  # log-monitoring-service with cortex.monitoring.probe.backend=eureka-actuator
  # + cortex.monitoring.slo.enabled=true + cortex.monitoring.slo.backend=
  # micrometer-derivation so both binder gates flip, then asserts:
  #   1. /actuator/prometheus exposes the probe counter family +
  #      both SLO gauges with HELP + TYPE comments.
  #   2. Prometheus's /api/v1/rules parses slo-burn-rate.rules.yml
  #      and lists the three alert rules
  #      (CortexSloFastBurn + CortexSloSlowBurn + CortexSloBudgetExhausted).
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: cortex-smoke-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/rules:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # P17 (ADR-0056): provisioned Grafana operator UI. Mounts the canonical
  # infra/grafana package read-only and points the Prometheus datasource at
  # the smoke Prometheus container through PROMETHEUS_URL.
  grafana:
    image: grafana/grafana:11.3.1
    container_name: cortex-smoke-grafana
    ports:
      - "3000:3000"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cortex
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cortex-overview.json
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
    restart: unless-stopped
