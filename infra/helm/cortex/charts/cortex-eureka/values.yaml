replicaCount: 1
image:
  repository: cortex/eureka-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent
imagePullSecrets: []
serviceAccount:
  create: true
  name: ""
  automount: false
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false
service:
  type: ClusterIP
  port: 8761
  targetPort: 8761
  annotations: {}
env: {}
secretEnv: {}
envFrom: []
resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    memory: 768Mi
probes:
  startup:
    enabled: true
    path: /actuator/health
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 36
  liveness:
    enabled: true
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  readiness:
    enabled: true
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
nodeSelector: {}
tolerations: []
affinity: {}
