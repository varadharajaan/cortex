replicaCount: 1
image:
  repository: cortex/log-ingest-service
  tag: "0.1.0"
  pullPolicy: IfNotPresent
imagePullSecrets: []
serviceAccount:
  create: true
  name: ""
  automount: false
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false
service:
  type: ClusterIP
  port: 8092
  targetPort: 8092
  annotations: {}
env:
  EUREKA_DEFAULT_ZONE: http://cortex-eureka:8761/eureka/
  CORTEX_INGEST_DB_URL: jdbc:postgresql://cortex-postgres:5432/cortex_ingest
  CORTEX_INGEST_DB_USERNAME: cortex_ingest
  REDIS_HOST: cortex-redis
  REDIS_PORT: "6379"
  CORTEX_KAFKA_BROKERS: cortex-kafka:9093
secretEnv:
  CORTEX_INGEST_DB_PASSWORD: cortex_ingest
envFrom: []
resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    memory: 1Gi
probes:
  startup:
    enabled: true
    path: /actuator/health
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 48
  liveness:
    enabled: true
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  readiness:
    enabled: true
    path: /actuator/health/readiness
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
nodeSelector: {}
tolerations: []
affinity: {}
