# ---------------------------------------------------------------------------
# CORTEX log-indexer-service - base profile (rule A6.1, 15.2).
#
# P7.0 scaffold: actuator + Eureka + QuickwitIndexAdmin SPI stub
# (noop default) + Micrometer counter + Quickwit health indicator.
# Profile-specific overrides live in application-{profile}.yml
# (none required at P7.0).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-indexer-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # :8090 gateway / :8092 ingest / :8093 echo / :8094 wiremock /
  # :8095 processor / :8096 remediation / :8097 indexer -- next free port.
  port: 8097
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

cortex:
  indexer:
    # QuickwitIndexAdmin SPI binder gate (P7.0 / ADR-0038 D1).
    #
    # `backend` is the binder gate read by @ConditionalOnProperty on
    #           each admin impl:
    #             noop     -> NoopQuickwitIndexAdmin (default;
    #                          returns IndexAdminResult.noop() for
    #                          every call; zero outbound HTTP)
    #             quickwit -> QuickwitHttpIndexAdmin (P7.1+; real
    #                          HTTP admin client against the
    #                          Quickwit /api/v1 surface)
    # The real backend property block (base-url, request-timeout, etc.)
    # lands alongside the P7.1 HTTP admin impl so the P7.0 yml stays
    # minimal.
    admin:
      backend: ${CORTEX_INDEXER_BACKEND:noop}
    # Quickwit HTTP admin client config (P7.1 / ADR-0039).
    # Bound to QuickwitProperties when `cortex.indexer.admin.backend=quickwit`.
    # The noop backend (P7.0 default) never reads these keys.
    quickwit:
      base-url: ${CORTEX_QUICKWIT_BASE_URL:http://localhost:7280}
      # Per-request HTTP read + connect timeout (LD121 dual-timeout).
      request-timeout: ${CORTEX_QUICKWIT_REQUEST_TIMEOUT:5s}
      # Stable doc-mapping schema id stamped into every index_id
      # (ADR-0038 D2).
      doc-mapping-version: ${CORTEX_QUICKWIT_DOC_MAPPING_VERSION:v1}
