# ---------------------------------------------------------------------------
# CORTEX log-monitoring-service - base profile (rule A6.1, 15.2).
#
# P8.0 scaffold: actuator + Eureka + ServiceHealthProbe SPI stub
# (noop default) + Micrometer counter + Monitoring health
# indicator. Profile-specific overrides live in
# application-{profile}.yml (none required at P8.0).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-monitoring-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # :8090 gateway / :8092 ingest / :8093 echo / :8094 wiremock /
  # :8095 processor / :8096 remediation / :8097 indexer /
  # :8098 monitoring -- next free port.
  port: 8098
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

cortex:
  monitoring:
    # ServiceHealthProbe SPI binder gate (P8.0 / ADR-0044 D1) +
    # multi-target probe pump configuration (P8.2b / ADR-0046
    # Amendment 3 2026-06-08).
    #
    # `backend` is the binder gate read by @ConditionalOnProperty on
    #           each probe impl:
    #             noop            -> NoopServiceHealthProbe (default;
    #                                returns HealthSnapshot.noop()
    #                                for every call; zero outbound
    #                                HTTP)
    #             eureka-actuator -> EurekaActuatorHealthProbe
    #                                (P8.1 / ADR-0045; real
    #                                Eureka-discovery REST scrape of
    #                                /actuator/health on every
    #                                registered cortex service)
    #
    # `enabled` gates the scheduled ScheduledProbeEvaluator multi-
    # target pump (P8.2b); OFF by default so the scheduled task does
    # not fire unless the operator opts in per profile. Mirrors the
    # cortex.monitoring.slo.enabled contract below.
    #
    # `evaluation-interval` controls the @Scheduled firing cadence
    # on ScheduledProbeEvaluator. Operator-friendly Spring Duration
    # syntax is accepted here (e.g. `30s`, `1m`, `2m30s`, `PT1H`);
    # values are bound through ProbeProperties.evaluationInterval()
    # (a java.time.Duration) and then adapted into the long-millis
    # form Spring's @Scheduled processor accepts via the
    # `probeEvaluationIntervalMillis` bean defined in
    # ProbeSchedulerConfig (LD141 standing rule -- direct
    # `${...:30s}` placeholder usage on
    # @Scheduled(fixedRateString=...) is NOT safe because the
    # processor calls Long.parseLong with no Duration fallback).
    # Defaults to 30 s, matches the Prometheus scrape interval used
    # by infra/local.
    #
    # `targets` is the operator-declared list of Eureka service ids
    # the pump iterates each tick. Ships with all six cortex
    # services so flipping `enabled: true` + `backend: eureka-
    # actuator` gives availability monitoring for the entire
    # P3..P7 ring with zero additional config. Operators override
    # the list per profile via the standard @ConfigurationProperties
    # precedence (e.g. set CORTEX_MONITORING_PROBE_TARGETS or
    # provide a profile-specific cortex.monitoring.probe.targets
    # block).
    probe:
      backend: ${CORTEX_MONITORING_PROBE_BACKEND:noop}
      enabled: ${CORTEX_MONITORING_PROBE_ENABLED:false}
      evaluation-interval: ${CORTEX_MONITORING_PROBE_EVALUATION_INTERVAL:30s}
      targets:
        - log-gateway
        - log-ingest-service
        - log-echo-service
        - log-processor-service
        - log-remediation-service
        - log-indexer-service

    # EurekaActuatorHealthProbe configuration (P8.1 / ADR-0045 D2).
    #
    # Only consumed when `probe.backend=eureka-actuator`. Defensive
    # defaults in EurekaActuatorProperties coerce null/zero/negative
    # request-timeout to 5 s and null/blank actuator-path to
    # `/actuator/health` so a partially-filled yml still wires.
    #
    # request-timeout binds connect + read on the JDK HttpClient per
    # LD42 HTTP/1.1 pin + LD121 dual-timeout. On expiry the probe
    # returns transient_failure with reason
    # `eureka-actuator:timeout`.
    eureka:
      request-timeout: ${CORTEX_MONITORING_EUREKA_REQUEST_TIMEOUT:5s}
      actuator-path: ${CORTEX_MONITORING_EUREKA_ACTUATOR_PATH:/actuator/health}

    # SloBudgetEngine configuration (P8.2 / ADR-0046 D2 / D4).
    #
    # `enabled` gates the scheduled SloEvaluator; OFF by default
    # so the scheduled task does not fire unless the operator
    # opts in per profile.
    #
    # `backend` is the binder gate read by @ConditionalOnProperty
    # on each engine impl:
    #     noop                  -> NoopSloBudgetEngine (default;
    #                              returns SloSnapshot.noop() for
    #                              every call; no MeterRegistry
    #                              introspection)
    #     micrometer-derivation -> MicrometerSloBudgetEngine
    #                              (reads cortex.monitoring.probe_total
    #                              counters from the in-process
    #                              MeterRegistry, derives ratios)
    #     counter-family        -> CounterFamilySloBudgetEngine
    #                              (P8.3; discovers each target
    #                              service by service-id, scrapes
    #                              /actuator/prometheus, and derives
    #                              ratios from a configured counter
    #                              family + success/failure tag
    #                              predicates)
    #     timer-percentile      -> TimerPercentileSloBudgetEngine
    #                              (P8.4; scrapes Micrometer
    #                              histogram buckets and treats the
    #                              bucket at/below the configured
    #                              latency threshold as success)
    #     promql                -> PromQlSloBudgetEngine
    #                              (P8.5; calls Prometheus
    #                              /api/v1/query for explicit success
    #                              and failure instant-query counts)
    #     composite             -> CompositeSloBudgetEngine
    #                              (P8.6; composes latest child
    #                              snapshots via worst-of or
    #                              weighted-average)
    #     otel                  -> OtelSloBudgetEngine
    #                              (P8.7+; scrapes span-derived
    #                              counter families exposed in
    #                              Prometheus text format)
    #     mixed                 -> activates all source-aware
    #                              engines and routes each
    #                              definition by its nested source
    #
    # `evaluation-interval` controls the @Scheduled firing cadence
    # on the SloEvaluator. Operator-friendly Spring Duration
    # syntax is accepted here (e.g. `30s`, `1m`, `2m30s`, `PT1H`);
    # values are bound through SloProperties.evaluationInterval()
    # (a java.time.Duration) and then adapted into the long-millis
    # form Spring's @Scheduled processor accepts via the
    # `sloEvaluationIntervalMillis` bean defined in
    # SloEngineConfig (issue #120 / LD137 / ADR-0046 Amendment
    # 2026-06-08 -- direct `${...:30s}` placeholder usage on
    # @Scheduled(fixedRateString=...) is NOT safe because the
    # processor calls Long.parseLong with no Duration fallback).
    # Defaults to 30 s, matches the Prometheus scrape interval
    # used by infra/local.
    #
    # `definitions` is the operator-declared list of SLO targets
    # the evaluator iterates each tick. Each definition binds
    # service-id (Eureka service id), slo-name (free-form bounded
    # label), target-success-ratio (in the open interval (0, 1)),
    # and window (Duration string, e.g. "1h" / "PT1H"). Ships with
    # one `availability` SLO per cortex service (P8.2b / ADR-0046
    # Amendment 3 2026-06-08) at 99% success over a 1 h window so
    # flipping `enabled: true` + `backend: micrometer-derivation`
    # gives the entire P3..P7 ring availability SLOs for free.
    # Operators override the list per profile via the standard
    # @ConfigurationProperties precedence.
    #
    # For `backend=counter-family`, each definition also declares
    # a nested `counter-family` source:
    #   metric-name: cortex.remediation.dispatched_total
    #   required-tags: { channel: slack }
    #   success-tag-predicate: { tag-name: outcome, tag-values: [dispatched] }
    #   failure-tag-predicate:
    #     tag-name: outcome
    #     tag-values: [transient_failure, permanent_failure]
    #
    # For `backend=timer-percentile` or `mixed`, latency definitions
    # declare a nested `timer` source:
    #   metric-name: http_server_requests_seconds
    #   threshold: 500ms
    #   required-tags: { uri: /api/v1/logs/batch }
    #
    # For `backend=promql` or `mixed`, external-source definitions
    # declare a nested `prom-ql` source:
    #   success-query: sum(rate(cortex_indexer_search_total{outcome="ok"}[5m]))
    #   failure-query: sum(rate(cortex_indexer_search_total{outcome!="ok"}[5m]))
    #
    # For `backend=composite` or `mixed`, aggregate definitions
    # declare a nested `composite` source:
    #   mode: worst-of
    #   components:
    #     - service-id: log-gateway
    #       slo-name: availability
    #       weight: 1.0
    #
    # For `backend=otel` or `mixed`, span-metric ratio definitions
    # declare a nested `otel` source with the same metric/predicate
    # shape as `counter-family`.
    slo:
      enabled: ${CORTEX_MONITORING_SLO_ENABLED:false}
      backend: ${CORTEX_MONITORING_SLO_BACKEND:noop}
      evaluation-interval: ${CORTEX_MONITORING_SLO_EVALUATION_INTERVAL:30s}
      counter-family:
        request-timeout: ${CORTEX_MONITORING_SLO_COUNTER_FAMILY_REQUEST_TIMEOUT:5s}
        actuator-path: ${CORTEX_MONITORING_SLO_COUNTER_FAMILY_ACTUATOR_PATH:/actuator/prometheus}
      timer-percentile:
        request-timeout: ${CORTEX_MONITORING_SLO_TIMER_PERCENTILE_REQUEST_TIMEOUT:5s}
        actuator-path: ${CORTEX_MONITORING_SLO_TIMER_PERCENTILE_ACTUATOR_PATH:/actuator/prometheus}
      promql:
        request-timeout: ${CORTEX_MONITORING_SLO_PROMQL_REQUEST_TIMEOUT:5s}
        base-url: ${CORTEX_MONITORING_SLO_PROMQL_BASE_URL:http://localhost:9090}
      otel:
        request-timeout: ${CORTEX_MONITORING_SLO_OTEL_REQUEST_TIMEOUT:5s}
        actuator-path: ${CORTEX_MONITORING_SLO_OTEL_ACTUATOR_PATH:/actuator/prometheus}
      definitions:
        - service-id: log-gateway
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
        - service-id: log-ingest-service
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
        - service-id: log-echo-service
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
        - service-id: log-processor-service
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
        - service-id: log-remediation-service
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
        - service-id: log-indexer-service
          slo-name: availability
          target-success-ratio: 0.99
          window: PT1H
