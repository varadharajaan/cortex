# ---------------------------------------------------------------------------
# CORTEX log-monitoring-service - base profile (rule A6.1, 15.2).
#
# P8.0 scaffold: actuator + Eureka + ServiceHealthProbe SPI stub
# (noop default) + Micrometer counter + Monitoring health
# indicator. Profile-specific overrides live in
# application-{profile}.yml (none required at P8.0).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-monitoring-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  # :8090 gateway / :8092 ingest / :8093 echo / :8094 wiremock /
  # :8095 processor / :8096 remediation / :8097 indexer /
  # :8098 monitoring -- next free port.
  port: 8098
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

cortex:
  monitoring:
    # ServiceHealthProbe SPI binder gate (P8.0 / ADR-0044 D1).
    #
    # `backend` is the binder gate read by @ConditionalOnProperty on
    #           each probe impl:
    #             noop            -> NoopServiceHealthProbe (default;
    #                                returns HealthSnapshot.noop()
    #                                for every call; zero outbound
    #                                HTTP)
    #             eureka-actuator -> EurekaActuatorHealthProbe
    #                                (P8.1 / ADR-0045; real
    #                                Eureka-discovery REST scrape of
    #                                /actuator/health on every
    #                                registered cortex service)
    probe:
      backend: ${CORTEX_MONITORING_PROBE_BACKEND:noop}

    # EurekaActuatorHealthProbe configuration (P8.1 / ADR-0045 D2).
    #
    # Only consumed when `probe.backend=eureka-actuator`. Defensive
    # defaults in EurekaActuatorProperties coerce null/zero/negative
    # request-timeout to 5 s and null/blank actuator-path to
    # `/actuator/health` so a partially-filled yml still wires.
    #
    # request-timeout binds connect + read on the JDK HttpClient per
    # LD42 HTTP/1.1 pin + LD121 dual-timeout. On expiry the probe
    # returns transient_failure with reason
    # `eureka-actuator:timeout`.
    eureka:
      request-timeout: ${CORTEX_MONITORING_EUREKA_REQUEST_TIMEOUT:5s}
      actuator-path: ${CORTEX_MONITORING_EUREKA_ACTUATOR_PATH:/actuator/health}
