# ---------------------------------------------------------------------------
# CORTEX log-monitoring-service - test classpath defaults (P8.0 /
# ADR-0044).
#
# Loaded with highest precedence under src/test/resources so unit
# @SpringBootTest classes boot without env vars and without reaching
# out to Eureka.
#
# Per LD100: src/test/resources/application.yml fully shadows the
# src/main one under Spring Boot. We therefore re-declare every
# placeholder the production beans dereference
# (cortex.monitoring.probe.backend) so a bare
# @SpringBootTest(classes = CortexMonitoringApplication.class)
# bootstraps without external state.
# ---------------------------------------------------------------------------

# Eureka disabled at the property level so the test JVM does not
# attempt to register with a registry that isn't running (ADR-0016).
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

spring:
  application:
    name: log-monitoring-service

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans

# Production placeholder defaults required to wire
# NoopServiceHealthProbe, MonitoringMetrics, MonitoringHealthIndicator
# in a full context load. Values mirror application.yml defaults so
# tests stay representative of dev.
cortex:
  monitoring:
    probe:
      # Force noop backend in tests - real Eureka-discovery probe
      # lands in P8.1+ and will be exercised by its own opt-in
      # @SpringBootTest slice.
      backend: noop
      # ScheduledProbeEvaluator gate (P8.2b / ADR-0046 Amendment 3).
      # OFF in tests so the scheduled multi-target pump does not
      # fire during boot smoke. The pump bean is gated by
      # @ConditionalOnProperty(enabled=true), so this default
      # keeps it OUT of the unit-test context entirely.
      enabled: false
      evaluation-interval: 30s
      # Empty list in tests (vs the six-service prod default) so
      # closer ITs that flip `enabled: true` can declare their own
      # targets via @TestPropertySource / @SpringBootTest(properties=)
      # without inheriting the prod defaults that would point at
      # services that don't exist in the test JVM. Closer ITs that
      # WANT the prod defaults can re-declare them inline.
      targets: []
    # SLO budget engine (P8.2 / ADR-0046). Disabled in tests so the
    # @Scheduled SloEvaluator does not fire during boot smoke; the
    # noop backend is still wired (matchIfMissing=true) so the SPI
    # bean is present. Tests that exercise the engine instantiate
    # SloEvaluator directly with hand-rolled engines.
    slo:
      enabled: false
      backend: noop
      evaluation-interval: 30s
      counter-family:
        request-timeout: 5s
        actuator-path: /actuator/prometheus
      definitions: []
