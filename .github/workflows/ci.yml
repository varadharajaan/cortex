# CI/CD workflow for CORTEX.
#
# Phase: P14
# Runs on push to main, semantic release tags, manual dispatch, and every PR.
# The pipeline owns:
#   - Conventional Commit linting on PRs.
#   - Full root `mvn verify`, including Testcontainers-backed integration tests.
#   - Eight runtime image builds from the P10 Dockerfiles.
#   - Trivy vulnerability scan of every built image (blocking on fixable
#     HIGH/CRITICAL; framework-locked residuals allowlisted in .trivyignore).
#   - GHCR publish + keyless cosign signing only for trusted push/tag events.
#   - Newman API tests: boot the compose stack and run the six per-service
#     Postman collections against the in-network services (P15).
#   - Gatling SLO load test against the booted compose stack (P16).

name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  IMAGE_REGISTRY: ghcr.io

permissions:
  contents: read

jobs:

  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli \
            @commitlint/config-conventional
      - name: Lint PR commits
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose

  maven-verify:
    name: Maven verify + Testcontainers
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      checks: write
    env:
      TESTCONTAINERS_REUSE_ENABLE: 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Show Docker runtime for Testcontainers
        run: |
          docker version
          docker info
      - name: Full Maven verify
        run: ./mvnw -B -ntp verify
      - name: Upload Maven verification reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: maven-verification-reports
          if-no-files-found: ignore
          retention-days: 14
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/site/jacoco/**
            **/target/checkstyle-result.xml
            **/target/spotbugsXml.xml
            **/target/dependency-check-report.*
            **/target/cyclonedx-sbom.*
            target/cyclonedx-sbom.*

  release-tooling:
    name: Release tooling readiness
    runs-on: ubuntu-latest
    needs: maven-verify
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: sigstore/cosign-installer@v3
      - name: Show cosign version
        run: cosign version
      # The operator release scripts (scripts/release/*) and the
      # scripts/live-e2e/smoke-p18-release-prep.ps1 dry-run are local-only
      # (/scripts/ is gitignored per checkpoint policy) and run in the local
      # release triangle. CI verifies the cosign toolchain installs plus the
      # tracked release artifacts and pom release hooks so a fresh checkout
      # is provably release-ready without depending on untracked scripts.
      - name: Verify release readiness from tracked artifacts
        shell: bash
        run: |
          set -euo pipefail
          for doc in \
            docs/release/v0.1.0-runbook.md \
            docs/release/v0.1.0-release-notes.md \
            docs/release/README.md \
            docs/adr/0057-p18-release-prep-and-publish-gate.md; do
            test -f "$doc" || { echo "missing release artifact: $doc" >&2; exit 1; }
            echo "found $doc"
          done
          for needle in \
            '<id>release</id>' \
            'cyclonedx-maven-plugin' \
            'dependency-check-maven' \
            'maven-javadoc-plugin' \
            'maven-source-plugin'; do
            grep -qF "$needle" pom.xml || { echo "pom.xml missing: $needle" >&2; exit 1; }
            echo "pom.xml has $needle"
          done
          echo "cosign toolchain installed; operator release scripts run in the local triangle"

  image-build:
    name: Image build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: maven-verify
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: eureka-server
            dockerfile: infra/docker/eureka-server.Dockerfile
          - image: log-gateway
            dockerfile: infra/docker/log-gateway.Dockerfile
          - image: log-ingest-service
            dockerfile: infra/docker/log-ingest-service.Dockerfile
          - image: log-echo-service
            dockerfile: infra/docker/log-echo-service.Dockerfile
          - image: log-processor-service
            dockerfile: infra/docker/log-processor-service.Dockerfile
          - image: log-remediation-service
            dockerfile: infra/docker/log-remediation-service.Dockerfile
          - image: log-indexer-service
            dockerfile: infra/docker/log-indexer-service.Dockerfile
          - image: log-monitoring-service
            dockerfile: infra/docker/log-monitoring-service.Dockerfile
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Resolve image namespace
        id: image-scope
        shell: bash
        run: |
          echo "namespace=${GITHUB_REPOSITORY_OWNER,,}/cortex" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ steps.image-scope.outputs.namespace }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=tag
      - name: Build image for Trivy scan
        id: build-scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          network: host
          load: true
          push: false
          tags: ${{ matrix.image }}:scan
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false
      - name: Scan image with Trivy
        # Blocking image gate: fails the job on a fixable HIGH/CRITICAL OS or
        # library CVE (ignore-unfixed: true). The P14 backlog burndown (#156)
        # bumped Spring Boot 3.3.6 -> 3.3.13, Spring AI -> 1.0.8, Netty,
        # Tomcat, XStream, BouncyCastle, and apt-upgraded the base images so
        # the eight images are clean on a patched 3.3.x baseline. A handful of
        # residual CVEs whose only fix requires a Spring Boot 3.4+/Framework
        # 6.2+/Security 6.5+ migration (a locked-stack decision, see #156) are
        # listed in .trivyignore with justification. OWASP Dependency-Check
        # (CVSS >= 8) remains the blocking dependency gate in maven-verify.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'
          vuln-type: os,library
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          network: host
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false
      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'
      - name: Sign pushed image digest
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ steps.image-scope.outputs.namespace }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Sign release tag reference
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ steps.image-scope.outputs.namespace }}/${{ matrix.image }}
          TAG: ${{ github.ref_name }}
        run: |
          cosign sign --yes "${IMAGE}:${TAG}"

  newman:
    name: Newman API tests (compose)
    runs-on: ubuntu-latest
    needs: maven-verify
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - name: Build the service images (host network for Maven Central)
        run: |
          set -e
          for df in infra/docker/*.Dockerfile; do
            name=$(basename "$df" .Dockerfile)
            docker build --network=host -f "$df" -t "cortex/${name}:0.1.0" .
          done
      - name: Boot the compose stack
        run: docker compose -f infra/docker/docker-compose.yml up -d
      - name: Wait for the gateway to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8090/actuator/health >/dev/null 2>&1; then
              echo "gateway healthy"; exit 0
            fi
            sleep 5
          done
          echo "gateway did not become healthy in time" >&2
          docker compose -f infra/docker/docker-compose.yml ps
          exit 1
      - name: Wait for gateway discovery convergence (downstreams routable)
        run: |
          # The gateway's own health flips UP before its Eureka-discovered
          # downstreams (echo/ingest/indexer) have registered and entered the
          # gateway route cache, so a suite that fires the instant the gateway
          # is healthy races discovery and sees 5xx "no instance available".
          # Gate on the real authenticated routes -- one token, reused -- until
          # the gateway can actually reach each downstream, then flush the
          # rate-limit buckets the probe drained so the suite starts clean.
          token=$(curl -fsS -X POST http://localhost:8090/api/v1/auth/login \
            -H 'Content-Type: application/json' -H 'X-Tenant-Id: cortex-dev' \
            -d '{"username":"admin","password":"dev-admin-pass"}' | jq -r .accessToken)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "could not mint a bootstrap token for the convergence probe" >&2
            exit 1
          fi
          batch='{"entries":[{"timestamp":"2026-01-01T00:00:00Z","level":"INFO","service":"ci-readiness","message":"discovery probe"}]}'
          for i in $(seq 1 60); do
            b=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8090/api/v1/logs/batch \
              -H 'Content-Type: application/json' -H 'X-Tenant-Id: cortex-dev' -H "Authorization: Bearer $token" -d "$batch" || echo 000)
            s=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8090/api/v1/logs/search?index=cortex-cortex-dev-app&q=level:ERROR&maxHits=1" \
              -H 'X-Tenant-Id: cortex-dev' -H "Authorization: Bearer $token" || echo 000)
            e=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8090/echo/ping -H "Authorization: Bearer $token" || echo 000)
            echo "convergence probe #$i: logs/batch=$b logs/search=$s echo/ping=$e"
            if [ "$b" = "202" ] && { [ "$s" = "200" ] || [ "$s" = "404" ]; } && [ "$e" = "200" ]; then
              echo "all gateway downstreams routable"
              docker exec cortex-redis redis-cli FLUSHALL >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 5
          done
          echo "gateway downstreams did not become routable in time" >&2
          docker compose -f infra/docker/docker-compose.yml ps
          exit 1
      - name: Run Newman against the in-network services
        run: |
          set -e
          # $1 collection, $2 environment, $3 base_url, $4.. extra "key=value"
          # overrides (cross-service URLs that must resolve on cortex-net, not
          # the host loopback the local env files default to).
          run() {
            local collection="$1" environment="$2" base_url="$3"
            shift 3
            local extra=()
            local kv
            for kv in "$@"; do extra+=(--env-var "$kv"); done
            docker run --rm --network cortex-net \
              -v "$PWD/postman:/etc/newman" \
              postman/newman:6-alpine \
              run "/etc/newman/$collection" \
              -e "/etc/newman/$environment" \
              --env-var "base_url=$base_url" \
              "${extra[@]}" \
              --reporters cli --bail
          }
          run log-gateway.postman_collection.json     log-gateway.postman_environment_local.json     http://cortex-gateway:8090
          run log-ingest.postman_collection.json      log-ingest.postman_environment_local.json      http://cortex-ingest:8092
          run log-processor.postman_collection.json   log-processor.postman_environment_local.json   http://cortex-processor:8095   ingest_base_url=http://cortex-ingest:8092 gateway_base_url=http://cortex-gateway:8090
          run log-remediation.postman_collection.json log-remediation.postman_environment_local.json http://cortex-remediation:8096 wiremock_base_url=http://cortex-wiremock:8080
          run log-indexer.postman_collection.json     log-indexer.postman_environment_local.json     http://cortex-indexer:8097     quickwit_base_url=http://cortex-quickwit:7280
          run log-monitoring.postman_collection.json  log-monitoring.postman_environment_local.json  http://cortex-monitoring:8098  prometheus_base_url=http://cortex-prometheus:9090
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker/docker-compose.yml logs --no-color --tail 200
      - name: Tear down the compose stack
        if: always()
        run: docker compose -f infra/docker/docker-compose.yml down -v

  load-test:
    name: Gatling load (SLO gate)
    runs-on: ubuntu-latest
    needs: maven-verify
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build the service images (host network for Maven Central)
        run: |
          set -e
          for df in infra/docker/*.Dockerfile; do
            name=$(basename "$df" .Dockerfile)
            docker build --network=host -f "$df" -t "cortex/${name}:0.1.0" .
          done
      - name: Boot the compose stack
        run: docker compose -f infra/docker/docker-compose.yml up -d
      - name: Wait for the gateway to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8090/actuator/health >/dev/null 2>&1; then
              echo "gateway healthy"; exit 0
            fi
            sleep 5
          done
          echo "gateway did not become healthy in time" >&2
          docker compose -f infra/docker/docker-compose.yml ps
          exit 1
      - name: Wait for gateway discovery convergence (indexer routable)
        run: |
          # The gateway's own health flips UP before the Eureka-discovered
          # log-indexer-service has registered and entered the gateway route
          # cache, so a load run that fires the instant the gateway is healthy
          # races discovery and sees 502 "no instance available" on the search
          # path (the sim's read surface). Gate on the real search route until
          # the gateway can reach the indexer, then flush Redis so the SLO run
          # starts on clean rate-limit buckets and measures latency, not
          # warm-up rejections.
          token=$(curl -fsS -X POST http://localhost:8090/api/v1/auth/login \
            -H 'Content-Type: application/json' -H 'X-Tenant-Id: cortex-dev' \
            -d '{"username":"admin","password":"dev-admin-pass"}' | jq -r .accessToken)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "could not mint a bootstrap token for the convergence probe" >&2
            exit 1
          fi
          for i in $(seq 1 60); do
            s=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8090/api/v1/logs/search?index=cortex-cortex-dev-app&q=level:ERROR&maxHits=1" \
              -H 'X-Tenant-Id: cortex-dev' -H "Authorization: Bearer $token" || echo 000)
            echo "convergence probe #$i: logs/search=$s"
            if [ "$s" = "200" ] || [ "$s" = "404" ]; then
              echo "indexer routable through gateway"
              docker exec cortex-redis redis-cli FLUSHALL >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 5
          done
          echo "indexer did not become routable through the gateway in time" >&2
          docker compose -f infra/docker/docker-compose.yml ps
          exit 1
      - name: Run the Gatling SLO simulation
        run: |
          cd log-load-tests
          ../mvnw -B -ntp gatling:test "-Dcortex.load.baseUrl=http://localhost:8090"
      - name: Upload the Gatling report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gatling-report
          path: log-load-tests/target/gatling/**
          if-no-files-found: ignore
          retention-days: 14
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker/docker-compose.yml logs --no-color --tail 200
      - name: Tear down the compose stack
        if: always()
        run: docker compose -f infra/docker/docker-compose.yml down -v
