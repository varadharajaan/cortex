# CORTEX -- Sonar properties
# Rule B16: SonarQube / SonarCloud quality gate.

sonar.projectKey=varadharajaan_cortex
sonar.organization=varadharajaan
sonar.projectName=CORTEX
sonar.projectVersion=0.1.0-SNAPSHOT

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.libraries=target/dependency/*.jar
sonar.java.source=17

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-aggregate/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

sonar.exclusions=\
  **/generated/**,\
  **/target/**,\
  **/*Application.java,\
  **/dto/**,\
  **/config/**,\
  **/package-info.java

sonar.coverage.exclusions=\
  **/generated/**,\
  **/*Application.java,\
  **/dto/**,\
  **/entity/**,\
  **/config/**,\
  **/exception/*Exception.java
