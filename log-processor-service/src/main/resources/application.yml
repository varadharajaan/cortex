# ---------------------------------------------------------------------------
# CORTEX log-processor-service - base profile (rule A6.1, 15.2).
#
# P5.0 scaffold + first production code path: actuator + Eureka +
# Spring for Apache Kafka consumer for cortex.logs.events.v1 +
# AnomalyClassifier SPI stub + 3 Micrometer counters. Profile-specific
# overrides live in application-{profile}.yml (none required at P5.0).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-processor-service
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # ----- Kafka consumer (P5.0 / ADR-0028) ---------------------------------
  # Direct Spring for Apache Kafka @KafkaListener container per LD79 +
  # ADR-0026 + ADR-0028 D1 (symmetric with the P4.4b KafkaTemplate
  # producer pivot). Manual ack semantics control offset commit
  # so we only mark messages consumed after the classifier returns
  # and downstream fan-out (P5.3) acknowledges. Bootstrap servers
  # default to the local-dev compose broker on localhost:9092.
  kafka:
    bootstrap-servers: ${CORTEX_KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: ${CORTEX_PROCESSOR_CONSUMER_GROUP:cortex.processor.v1}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    listener:
      ack-mode: manual
      # missing-topics-fatal=false lets the consumer boot before the
      # topic exists (local-dev / auto-create-topics-enable=true on
      # the smoke compose stack); the listener container retries the
      # subscribe attempt until the broker advertises the topic.
      missing-topics-fatal: false

server:
  # 8093 is owned by log-echo-service; co-exist with the full local stack.
  port: 8095
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}

# Eureka client (ADR-0016).
# Defaults point at the local-dev standalone registry. Override in
# every non-dev profile (staging / prod use K8s Service DNS, not Eureka).
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

cortex:
  processor:
    # Topic this consumer listens to. CloudEvents 1.0 structured-mode
    # JSON envelopes produced by log-ingest-service per ADR-0026.
    topic: ${CORTEX_PROCESSOR_TOPIC:cortex.logs.events.v1}
    # DLQ topic for consumer-side parse + validate failures (P5.1 /
    # ADR-0027 contract mirror). DlqPublisher writes the original
    # record bytes byte-for-byte with a `x-failure-reason` Kafka
    # header set to `parse_error` or `schema_violation`. Topic is
    # auto-created in local-dev (KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    # on the smoke compose stack); pre-create in staging / prod via
    # the cluster Terraform module.
    dlq:
      topic: ${CORTEX_PROCESSOR_DLQ_TOPIC:cortex.logs.events.v1.dlq}
    # AnomalyClassifier SPI configuration (P5.0 binder gate + P5.2
    # / ADR-0029 typed properties).
    #
    # `provider` is the binder gate read by @ConditionalOnProperty on
    #            each classifier impl:
    #              noop      -> NoopAnomalyClassifier (default; returns
    #                           Classification.none() for every event;
    #                           zero LLM dependency)
    #              spring-ai -> SpringAiAnomalyClassifier (Spring AI
    #                           1.0 ChatClient routed through Ollama
    #                           in dev or Azure OpenAI in prod per
    #                           ADR-0006).
    # The remaining keys bind to the ClassifierProperties record
    # and are inert when provider=noop (the bean is not loaded so
    # the values are never read).
    classifier:
      provider: ${CORTEX_PROCESSOR_CLASSIFIER:noop}
      model: ${CORTEX_PROCESSOR_CLASSIFIER_MODEL:mistral}
      temperature: ${CORTEX_PROCESSOR_CLASSIFIER_TEMPERATURE:0.2}
      max-tokens: ${CORTEX_PROCESSOR_CLASSIFIER_MAX_TOKENS:256}
      confidence-threshold: ${CORTEX_PROCESSOR_CLASSIFIER_CONFIDENCE_THRESHOLD:0.7}
      request-timeout: ${CORTEX_PROCESSOR_CLASSIFIER_REQUEST_TIMEOUT:PT10S}
      prompt-template: classpath:/prompts/anomaly-classifier.st

# Spring AI 1.0.0 Ollama starter config (P5.2 / ADR-0029 D1; ADR-0006).
# Inert when cortex.processor.classifier.provider=noop (the
# OllamaHttpConfig bean is conditional on provider=spring-ai). For
# dev / smoke runs point base-url at the local Ollama daemon (:11434)
# or the WireMock-stubbed Ollama endpoint (:8094 in the cortex-smoke
# compose stack). Production prefers Azure OpenAI per ADR-0006; the
# swap is config-only (replace this block with `spring.ai.azure.openai.*`).
spring.ai:
  ollama:
    base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
    chat:
      options:
        model: ${CORTEX_PROCESSOR_CLASSIFIER_MODEL:mistral}
        temperature: ${CORTEX_PROCESSOR_CLASSIFIER_TEMPERATURE:0.2}
    init:
      # Never auto-pull the model at startup. Bootstrap is operator
      # responsibility (local-dev: `ollama pull mistral`). Without
      # this, a missing model would block boot for 30+ seconds while
      # the starter shells out to the daemon to fetch ~4 GB.
      pull-model-strategy: never

logging:
  level:
    root: INFO
    io.cortex: INFO
    com.netflix.discovery: WARN
    # Quiet the consumer rebalance noise on local-dev; we want WARN
    # for actual problems, not the routine join-group transitions.
    org.apache.kafka.clients.consumer.internals: WARN
