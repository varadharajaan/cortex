# ---------------------------------------------------------------------------
# CORTEX log-gateway - test classpath defaults.
# Loaded with highest precedence under src/test/resources so @SpringBootTest
# boots without env vars. Bootstrap users + a deterministic JWT secret give
# tests a reproducible bearer-token round trip.
# ---------------------------------------------------------------------------

# Disable Eureka registry lookup in unit/integration tests (ADR-0016).
# MockMvc tests do not boot a registry; the eureka-client auto-config
# would otherwise log noisy connection-refused warnings every poll.
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

cortex:
  gateway:
    service: log-gateway
    environment: test
    security:
      jwt:
        # Deterministic 32-byte HMAC key (Base64 of 0x00..0x1F). TESTS ONLY.
        secret: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
        issuer: cortex-gateway-test
        access-ttl: PT15M
        refresh-ttl: P1D
      bootstrap:
        users:
          - username: admin
            password: test-admin-pass
            roles: [ADMIN, USER]
          - username: user
            password: test-user-pass
            roles: [USER]
    # Disable the Bucket4j + Lettuce + Redis stack in MockMvc tests
    # (P3.2 / ADR-0017). RateLimitConfig is @ConditionalOnProperty so
    # turning this off means no Lettuce client is constructed and no
    # connection-refused noise appears in logs.
    rate-limit:
      enabled: false
      capacity: 100
      refill-period: PT1M
      anonymous-capacity: 20
      redis-uri: redis://localhost:6379/0
    # Disable the NL-to-LogQL endpoint in MockMvc tests by default
    # (P3.3 / ADR-0018). NL-specific test classes re-enable it via
    # @SpringBootTest(properties = ...) and supply a test ChatClient.
    nl-query:
      enabled: false
    # Disable the searchLogs endpoint in MockMvc tests by default
    # (P9.1b / ADR-0049). Search-specific test classes re-enable it via
    # @SpringBootTest / @TestPropertySource and mock the service or the
    # downstream indexer.
    search-logs:
      enabled: false
    # Disable the getLogById endpoint in MockMvc tests by default
    # (P9.2b / ADR-0049). Get-by-id-specific test classes re-enable it.
    get-log-by-id:
      enabled: false

spring:
  ai:
    # No Spring AI auto-config in MockMvc tests (no Ollama on test classpath
    # boot). NL-specific @SpringBootTest classes provide a test ChatClient
    # bean directly.
    model:
      chat: none
      embedding: none

logging:
  level:
    io.cortex: DEBUG
    org.springframework.security: WARN
