# ---------------------------------------------------------------------------
# CORTEX log-gateway - base profile (rule A6.1, 15.2).
# Profile-specific overrides live in application-{profile}.yml.
# No secrets in this file; secrets come from env vars (rule A6.2).
# ---------------------------------------------------------------------------

spring:
  application:
    name: log-gateway
  main:
    banner-mode: "off"
  jackson:
    default-property-inclusion: non_null
  ai:
    # Spring AI 1.0.0 Ollama starter (B20.1, P3.3 / ADR-0018). The base
    # URL points at WireMock (port 8094) in dev/test smoke and at a real
    # Ollama (or Azure OpenAI under prod profile) elsewhere. Auto-pull is
    # OFF so a dev without a local model gets a deterministic 503 from
    # the gateway instead of a 10-minute model download on first request.
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: never
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_CHAT_MODEL:mistral}
          temperature: ${SPRING_AI_OLLAMA_CHAT_TEMPERATURE:0.2}
  # Spring for GraphQL (P9.0 / ADR-0004 / ADR-0049). Schema-first wiring
  # under src/main/resources/graphql/. Path stays the framework default
  # /graphql so client tooling is plug-and-play. GraphiQL and schema
  # introspection are OFF by default; operators flip them per
  # environment via CORTEX_GATEWAY_GRAPHQL_* env vars. Mutations are
  # forever rejected per ADR-0004 (rejected alternative RA5).
  graphql:
    path: ${CORTEX_GATEWAY_GRAPHQL_PATH:/graphql}
    schema:
      introspection:
        enabled: ${CORTEX_GATEWAY_GRAPHQL_INTROSPECTION_ENABLED:false}
    graphiql:
      enabled: ${CORTEX_GATEWAY_GRAPHQL_GRAPHIQL_ENABLED:false}

server:
  port: 8090
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  observations:
    key-values:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Eureka client (ADR-0016). The gateway only FETCHES the registry to
# resolve `lb://<service-id>` predicates. It does NOT register itself
# (nothing inside the cluster routes traffic to the gateway). Override
# `EUREKA_DEFAULT_ZONE` per environment; staging/prod use K8s Service
# DNS instead of Eureka entirely, so set `eureka.client.enabled=false`
# in those profiles.
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: false
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

cortex:
  gateway:
    service: log-gateway
    environment: local
    security:
      jwt:
        # Base64-encoded HMAC key (>= 32 bytes after decode). MUST come
        # from env in every non-dev profile. The placeholder fails fast
        # if no profile-specific override sets it.
        secret: ${CORTEX_GATEWAY_JWT_SECRET:}
        issuer: cortex-gateway
        access-ttl: PT15M
        refresh-ttl: P7D
      bootstrap:
        users: []
      # Anonymous IP-keyed sub-bucket for POST /auth/login (P3.4 /
      # ADR-0021). Defends against credential-stuffing on top of the
      # global anonymous bucket (P3.2). Read by the
      # @RateLimitFeature on AuthController.login.
      login-rate-limit-capacity: ${CORTEX_GATEWAY_AUTH_LOGIN_RL_CAPACITY:5}
      login-rate-limit-refill: ${CORTEX_GATEWAY_AUTH_LOGIN_RL_REFILL:PT1M}
    # Distributed rate limit (B5.1, P3.2 / ADR-0017). Bucket4j with a
    # Lettuce-backed Redis store. Authenticated callers consume from a
    # per-principal bucket; anonymous callers consume from a smaller
    # per-IP bucket. Disabled in src/test/resources so MockMvc tests
    # do not need a live Redis. Override `REDIS_URI` per environment.
    rate-limit:
      enabled: ${CORTEX_GATEWAY_RATE_LIMIT_ENABLED:true}
      capacity: ${CORTEX_GATEWAY_RATE_LIMIT_CAPACITY:100}
      refill-period: ${CORTEX_GATEWAY_RATE_LIMIT_REFILL:PT1M}
      anonymous-capacity: ${CORTEX_GATEWAY_RATE_LIMIT_ANON_CAPACITY:20}
      redis-uri: ${REDIS_URI:redis://localhost:6379/0}
      key-prefix: ${CORTEX_GATEWAY_RATE_LIMIT_PREFIX:cortex:rl:}
    # Natural-language query endpoint (B20.1, P3.3 / ADR-0018). Disabled
    # in src/test/resources for MockMvc tests that don't need it; the
    # NL-specific @SpringBootTest classes re-enable it explicitly.
    nl-query:
      enabled: ${CORTEX_GATEWAY_NL_QUERY_ENABLED:true}
      model: ${CORTEX_GATEWAY_NL_QUERY_MODEL:mistral}
      temperature: ${CORTEX_GATEWAY_NL_QUERY_TEMPERATURE:0.2}
      max-tokens: ${CORTEX_GATEWAY_NL_QUERY_MAX_TOKENS:512}
      confidence-floor: ${CORTEX_GATEWAY_NL_QUERY_CONFIDENCE_FLOOR:0.3}
      sub-bucket-capacity: ${CORTEX_GATEWAY_NL_QUERY_SUB_BUCKET_CAPACITY:10}
      sub-bucket-refill-period: ${CORTEX_GATEWAY_NL_QUERY_SUB_BUCKET_REFILL:PT1M}
      sub-bucket-key-prefix: ${CORTEX_GATEWAY_NL_QUERY_SUB_BUCKET_PREFIX:cortex:rl:nlq:}
    # Log search endpoint (P9.1b / ADR-0004 / ADR-0049). Proxies the
    # query to log-indexer-service (P9.1a) over lb:// via the blocking
    # LoadBalancerClient. Disabled in src/test/resources for MockMvc
    # tests that don't need it; the search-specific @SpringBootTest
    # classes re-enable it explicitly. The sub-bucket fields drive the
    # @RateLimitFeature("search-logs") shared by the REST + GraphQL
    # surfaces (one bucket per JWT subject, P9.0a parity).
    search-logs:
      enabled: ${CORTEX_GATEWAY_SEARCH_LOGS_ENABLED:true}
      service-id: ${CORTEX_GATEWAY_SEARCH_LOGS_SERVICE_ID:log-indexer-service}
      request-timeout: ${CORTEX_GATEWAY_SEARCH_LOGS_REQUEST_TIMEOUT:PT5S}
      default-max-hits: ${CORTEX_GATEWAY_SEARCH_LOGS_DEFAULT_MAX_HITS:50}
      max-hits-ceiling: ${CORTEX_GATEWAY_SEARCH_LOGS_MAX_HITS_CEILING:1000}
      sub-bucket-capacity: ${CORTEX_GATEWAY_SEARCH_LOGS_SUB_BUCKET_CAPACITY:30}
      sub-bucket-refill-period: ${CORTEX_GATEWAY_SEARCH_LOGS_SUB_BUCKET_REFILL:PT1M}
      sub-bucket-key-prefix: ${CORTEX_GATEWAY_SEARCH_LOGS_SUB_BUCKET_PREFIX:cortex:rl:search:}

logging:
  level:
    root: INFO
    io.cortex: INFO
