# ---------------------------------------------------------------------------
# CORTEX log-gateway - dev profile (rule A6.1, 15.2).
# Plain console logging, full health detail, debug-level CORTEX logs.
# Dev JWT secret + bootstrap users live here so a developer can run the
# gateway with zero env vars; both are overridden in staging / prod.
# ---------------------------------------------------------------------------

cortex:
  gateway:
    environment: dev
    security:
      jwt:
        # 32-byte HMAC secret, Base64 of bytes 0..31. DEV ONLY.
        secret: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
        issuer: cortex-gateway-dev
        access-ttl: PT15M
        refresh-ttl: P7D
      bootstrap:
        users:
          - username: admin
            password: dev-admin-pass
            roles: [ADMIN, USER]
          - username: user
            password: dev-user-pass
            roles: [USER]

management:
  endpoint:
    health:
      show-details: always

# Pin the dev-profile Eureka instance advertisement to loopback. The host
# may have multiple NICs (WiFi + corporate VPN tunnel); without this the
# auto-detected non-loopback IP is non-deterministic and the gateway can
# end up calling lb://log-ingest-service at an IP it cannot route to.
# Loopback is safe here because every Spring Boot app runs on the same
# developer machine in the dev profile. Staging / prod use K8s Service
# DNS instead of Eureka entirely, so this override is dev-only.
eureka:
  instance:
    ip-address: 127.0.0.1

logging:
  level:
    io.cortex: DEBUG
    org.springframework.security: INFO
