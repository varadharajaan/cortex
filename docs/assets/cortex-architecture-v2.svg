<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">CORTEX architecture v2 topology</title>
  <desc id="desc">A modern C4-style topology diagram for CORTEX showing external actors, platform boundary, service planes, data stores, event backbone, AI provider, remediation integrations, and runtime fabric.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="48%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f7f8fb"/>
    </linearGradient>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.05" fill="#cbd5e1" opacity="0.34"/>
    </pattern>
    <filter id="panelShadow" x="-7%" y="-8%" width="114%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .page { fill: url(#pageBg); }
      .grid { fill: url(#dotGrid); }
      .title { font: 800 44px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .boundary { fill: rgba(255,255,255,0.78); stroke: #cbd5e1; stroke-width: 1.5; filter: url(#panelShadow); }
      .boundaryTitle { font: 800 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; letter-spacing: 1.6px; }
      .zone { fill: rgba(255,255,255,0.78); stroke-width: 1.25; filter: url(#cardShadow); }
      .zoneTitle { font: 800 12px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.2px; }
      .service { fill: #ffffff; stroke-width: 1.7; filter: url(#cardShadow); }
      .store { fill: #ffffff; stroke-width: 1.7; filter: url(#cardShadow); }
      .external { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; filter: url(#cardShadow); }
      .svcTitle { font: 800 18px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .svcMeta { font: 700 13px Inter, Segoe UI, Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .small { font: 500 12.5px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .tiny { font: 800 11px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .9px; }
      .label { font: 800 12px Inter, Segoe UI, Arial, sans-serif; letter-spacing: .4px; }
      .legend { font: 750 12px Inter, Segoe UI, Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .blue { stroke: #2563eb; }
      .green { stroke: #059669; }
      .amber { stroke: #d97706; }
      .teal { stroke: #0891b2; }
      .rose { stroke: #e11d48; }
      .slate { stroke: #64748b; }
      .blueZone { stroke: #bfdbfe; }
      .greenZone { stroke: #bbf7d0; }
      .amberZone { stroke: #fde68a; }
      .tealZone { stroke: #a5f3fc; }
      .roseZone { stroke: #fecdd3; }
      .opsZone { stroke: #cbd5e1; }
      .writeLine { stroke: #2563eb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }
      .eventLine { stroke: #059669; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowGreen); }
      .readLine { stroke: #0f766e; stroke-width: 2.8; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 8; marker-end: url(#arrowGreen); }
      .remedyLine { stroke: #e11d48; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowRose); }
      .controlLine { stroke: #475569; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 8; marker-end: url(#arrowSlate); }
      .aiLine { stroke: #b45309; stroke-width: 2.7; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 8; marker-end: url(#arrowAmber); }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .chipText { font: 750 12px Inter, Segoe UI, Arial, sans-serif; fill: #334155; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="page" width="1600" height="1080"/>
  <rect class="grid" width="1600" height="1080"/>

  <g transform="translate(76 55)">
    <text class="title" x="0" y="0">CORTEX Architecture v2</text>
    <text class="subtitle" x="2" y="38">C4-style runtime topology for the AI-powered log management platform.</text>
  </g>

  <g transform="translate(1056 42)">
    <rect x="0" y="0" width="466" height="64" rx="18" fill="#ffffff" stroke="#dbe3ec" filter="url(#cardShadow)"/>
    <rect x="24" y="24" width="14" height="14" rx="4" fill="#2563eb"/>
    <text class="legend" x="48" y="36">Ingest</text>
    <rect x="118" y="24" width="14" height="14" rx="4" fill="#059669"/>
    <text class="legend" x="142" y="36">Events and sinks</text>
    <rect x="276" y="24" width="14" height="14" rx="4" fill="#0f766e"/>
    <text class="legend" x="300" y="36">Reads</text>
    <rect x="354" y="24" width="14" height="14" rx="4" fill="#e11d48"/>
    <text class="legend" x="378" y="36">Remedy</text>
  </g>

  <g>
    <rect class="external" x="72" y="236" width="166" height="112" rx="20"/>
    <text class="tiny" x="100" y="270">EXTERNAL</text>
    <text class="svcTitle" x="100" y="304">Tenant apps</text>
    <text class="small" x="100" y="330">log-agent-lib</text>

    <rect class="external" x="72" y="404" width="166" height="112" rx="20"/>
    <text class="tiny" x="100" y="438">EXTERNAL</text>
    <text class="svcTitle" x="100" y="472">Operators</text>
    <text class="small" x="100" y="498">REST + GraphQL</text>

    <rect class="external" x="1370" y="600" width="158" height="142" rx="20"/>
    <text class="tiny" x="1397" y="634">EXTERNAL</text>
    <text class="svcTitle" x="1397" y="668">Responders</text>
    <text class="small" x="1397" y="694">Slack</text>
    <text class="small" x="1397" y="716">PagerDuty, Jira</text>
  </g>

  <rect class="boundary" x="282" y="146" width="1052" height="804" rx="32"/>
  <text class="boundaryTitle" x="318" y="184">CORTEX PLATFORM BOUNDARY</text>

  <g>
    <rect class="zone blueZone" x="318" y="224" width="246" height="248" rx="24" fill="#eff6ff"/>
    <text class="zoneTitle" x="346" y="258" fill="#2563eb">EDGE AND API</text>
    <rect class="service blue" x="348" y="294" width="186" height="128" rx="18"/>
    <text class="svcTitle" x="374" y="334">log-gateway</text>
    <text class="svcMeta" x="374" y="364">edge API</text>
    <text class="small" x="374" y="388">auth, rate limit</text>
    <text class="small" x="374" y="410">search + anomaly facade</text>
  </g>

  <g>
    <rect class="zone greenZone" x="318" y="518" width="336" height="274" rx="24" fill="#ecfdf5"/>
    <text class="zoneTitle" x="346" y="552" fill="#059669">INGESTION PLANE</text>
    <rect class="service green" x="348" y="588" width="246" height="86" rx="18"/>
    <text class="svcTitle" x="374" y="625">log-ingest-service</text>
    <text class="small" x="374" y="650">validate, mask, dedupe, enrich</text>
    <path d="M368 716 C368 694 574 694 574 716 L574 752 C574 774 368 774 368 752 Z" class="store green"/>
    <ellipse cx="471" cy="716" rx="103" ry="22" fill="#ffffff" stroke="#059669" stroke-width="1.7"/>
    <text class="svcMeta" x="400" y="740">raw logs + outbox</text>
    <text class="small" x="400" y="762">Postgres durability</text>
  </g>

  <g>
    <rect class="zone amberZone" x="690" y="224" width="270" height="248" rx="24" fill="#fffbeb"/>
    <text class="zoneTitle" x="718" y="258" fill="#b45309">AI PROCESSING</text>
    <rect class="service amber" x="720" y="294" width="210" height="128" rx="18"/>
    <text class="svcTitle" x="746" y="334">log-processor</text>
    <text class="svcMeta" x="746" y="364">parse + classify</text>
    <text class="small" x="746" y="388">Loki/Quickwit fan-out</text>
    <text class="small" x="746" y="410">anomaly publisher</text>
    <rect class="service amber" x="720" y="156" width="210" height="58" rx="16" fill="#fff7ed"/>
    <text class="svcMeta" x="746" y="181">Spring AI provider</text>
    <text class="small" x="746" y="202">Ollama local, Azure OpenAI</text>
  </g>

  <g>
    <rect class="zone greenZone" x="690" y="518" width="270" height="274" rx="24" fill="#f0fdf4"/>
    <text class="zoneTitle" x="718" y="552" fill="#059669">EVENT BACKBONE</text>
    <rect class="service green" x="720" y="588" width="210" height="126" rx="18"/>
    <text class="svcTitle" x="746" y="626">Kafka</text>
    <text class="svcMeta" x="746" y="656">CloudEvents topics</text>
    <text class="small" x="746" y="680">cortex.logs.events.v1</text>
    <text class="small" x="746" y="702">cortex.anomalies.v1</text>
    <rect class="chip" x="742" y="738" width="166" height="30" rx="10"/>
    <text class="chipText" x="764" y="758">DLQ for malformed input</text>
  </g>

  <g>
    <rect class="zone tealZone" x="996" y="224" width="298" height="330" rx="24" fill="#ecfeff"/>
    <text class="zoneTitle" x="1024" y="258" fill="#0891b2">QUERY AND SEARCH PLANE</text>
    <rect class="service teal" x="1026" y="294" width="224" height="86" rx="18"/>
    <text class="svcTitle" x="1052" y="331">log-indexer</text>
    <text class="small" x="1052" y="356">search proxy + Quickwit admin</text>
    <path d="M1030 422 C1030 400 1250 400 1250 422 L1250 497 C1250 519 1030 519 1030 497 Z" class="store teal"/>
    <ellipse cx="1140" cy="422" rx="110" ry="22" fill="#ffffff" stroke="#0891b2" stroke-width="1.7"/>
    <text class="svcMeta" x="1066" y="447">search stores</text>
    <text class="small" x="1066" y="471">Postgres structured</text>
    <text class="small" x="1066" y="493">Loki labels, Quickwit text</text>
  </g>

  <g>
    <rect class="zone roseZone" x="996" y="600" width="298" height="192" rx="24" fill="#fff1f2"/>
    <text class="zoneTitle" x="1024" y="634" fill="#e11d48">REMEDIATION PLANE</text>
    <rect class="service rose" x="1026" y="666" width="224" height="86" rx="18"/>
    <text class="svcTitle" x="1052" y="703">log-remediation</text>
    <text class="small" x="1052" y="728">policy, playbook, audit</text>
    <rect class="chip" x="1026" y="768" width="106" height="30" rx="10"/>
    <text class="chipText" x="1044" y="788">read model</text>
    <rect class="chip" x="1146" y="768" width="104" height="30" rx="10"/>
    <text class="chipText" x="1165" y="788">outcomes</text>
  </g>

  <g>
    <rect class="zone opsZone" x="318" y="836" width="976" height="82" rx="24" fill="#f8fafc"/>
    <text class="zoneTitle" x="346" y="870" fill="#64748b">RUNTIME FABRIC</text>
    <rect class="chip" x="472" y="852" width="118" height="34" rx="11"/>
    <text class="chipText" x="502" y="874">Redis</text>
    <rect class="chip" x="614" y="852" width="126" height="34" rx="11"/>
    <text class="chipText" x="644" y="874">Eureka</text>
    <rect class="chip" x="764" y="852" width="174" height="34" rx="11"/>
    <text class="chipText" x="794" y="874">OpenTelemetry</text>
    <rect class="chip" x="962" y="852" width="178" height="34" rx="11"/>
    <text class="chipText" x="991" y="874">Prometheus SLOs</text>
    <rect class="chip" x="1164" y="852" width="96" height="34" rx="11"/>
    <text class="chipText" x="1192" y="874">Grafana</text>
  </g>

  <path class="writeLine" d="M238 314 H348"/>
  <text class="label" x="260" y="298" fill="#2563eb">batched logs</text>
  <path class="readLine" d="M238 460 C278 460 278 364 348 364"/>
  <text class="label" x="246" y="444" fill="#0f766e">queries</text>

  <path class="writeLine" d="M441 422 V588"/>
  <text class="label" x="454" y="500" fill="#2563eb">ingest API</text>
  <path class="writeLine" d="M594 632 C642 632 660 650 720 650"/>
  <text class="label" x="612" y="612" fill="#2563eb">outbox relay</text>
  <path class="eventLine" d="M825 588 V422"/>
  <text class="label" x="842" y="508" fill="#059669">log events</text>

  <path class="aiLine" d="M825 214 V294"/>
  <path class="eventLine" d="M930 352 H1026"/>
  <text class="label" x="948" y="334" fill="#059669">sink writes</text>
  <path class="remedyLine" d="M930 384 C972 430 970 706 1026 706"/>
  <text class="label" x="940" y="556" fill="#e11d48">anomaly events</text>

  <path class="readLine" d="M1140 380 V400"/>
  <text class="label" x="1157" y="394" fill="#0f766e">reads</text>
  <path class="remedyLine" d="M1250 706 H1370"/>
  <text class="label" x="1272" y="688" fill="#e11d48">fallback</text>
</svg>
